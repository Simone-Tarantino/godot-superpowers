name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # validate.sh is the canonical entrypoint: it covers JSON validity (incl.
      # marketplace.json), hooks parity, plugin/marketplace version coherence,
      # frontmatter, catalog drift, callout coverage, and link resolution.
      - name: Run validator
        run: bash scripts/validate.sh
